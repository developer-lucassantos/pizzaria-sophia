<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pizzaria Sophia | Artesanal & Raiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'sophia-orange': '#FF6B00', 'sophia-dark': '#0a0a0a' },
                    fontFamily: { 'righteous': ['Righteous'], 'sans': ['Poppins'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-sophia-dark text-white overflow-x-hidden">

    <nav class="fixed w-full z-[100] transition-all duration-500 border-b border-white/5" id="navbar">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col border-l-4 border-sophia-orange pl-3">
                <span class="font-righteous text-2xl tracking-tighter uppercase">SOPHIA</span>
                <span class="text-[8px] uppercase tracking-[0.4em] text-sophia-orange font-bold">Artesanal</span>
            </div>
            <a href="cardapio.html" class="bg-white text-black px-6 py-2 rounded-full font-extrabold text-[10px] uppercase hover:bg-sophia-orange hover:text-white transition-all shadow-xl">Pedir Agora</a>
        </div>
    </nav>

    <section class="relative h-[100svh] flex items-center px-6 lg:px-24">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-gradient-to-t from-sophia-dark via-sophia-dark/40 to-transparent z-10"></div>
            <img src="./assets/images/pizzasophia.jpeg" class="w-full h-full object-cover brightness-[0.6]" alt="Hero">
        </div>
        
        <div class="relative z-20 max-w-3xl">
            <h2 class="text-sophia-orange font-righteous text-xl mb-4 tracking-widest animate-item">3 GERAÇÕES DE TRADIÇÃO</h2>
            <h1 class="font-righteous text-6xl md:text-9xl leading-none mb-8 animate-item" style="animation-delay: 0.1s">A PIZZA<br><span class="text-sophia-orange italic">PERFEITA.</span></h1>
            <p class="text-gray-400 text-lg mb-10 max-w-md border-l-2 border-white/10 pl-6 animate-item" style="animation-delay: 0.2s">Massa de fermentação lenta aberta à mão e assada no fogo da lenha original.</p>
            <div class="flex gap-4 animate-item" style="animation-delay: 0.3s">
                <a href="cardapio.html" class="bg-sophia-orange p-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-sophia-orange/20">Abrir Cardápio</a>
                <a href="#localizacao" class="glass-card p-5 rounded-2xl font-bold text-xs uppercase tracking-widest">Onde Estamos</a>
            </div>
        </div>
    </section>

    <section id="localizacao" class="py-24 px-6 bg-sophia-dark">
        <div class="container mx-auto">
            <div class="flex justify-between items-end mb-12">
                <h2 class="font-righteous text-4xl uppercase">Visite-nos</h2>
                <div class="text-right text-[10px] text-gray-500 font-bold uppercase tracking-widest leading-loose">
                    Terça a Domingo<br><span class="text-white">18:00 — 00:00</span>
                </div>
            </div>
            <div class="rounded-[3rem] overflow-hidden glass-card p-2 shadow-inner">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d233933.60112758097!2d-46.75121660546875!3d-23.632559100000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce69d10b2c44bb%3A0x7d4b5754e8ba5db4!2sPizzaria%20Sophia!5e0!3m2!1spt-BR!2sbr!4v1774419998187!5m2!1spt-BR!2sbr" width="100%" height="450" class="rounded-[2.5rem] grayscale invert contrast-125 opacity-80" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-[10px] text-gray-600 uppercase tracking-[0.5em] border-t border-white/5">
        &copy; 2026 Pizzaria Sophia • Tradição e Sabor
    </footer>

    <script src="./js/main.js"></script>
</body>
</html>
